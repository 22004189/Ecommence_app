<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .welcome-container {
            background: white;
            padding: 60px 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 500px;
        }

        .welcome-container h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .welcome-container p {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            display: inline-block;
        }

        .btn:hover {
            background-color: #45a049;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .message {
            color: #4CAF50;
            font-size: 1.1em;
            margin: 20px 0;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="welcome-container">
        <div class="emoji">🎉</div>
        <h1>Welcome!</h1>
        <p>Your account has been successfully created.</p>
        <p class="message">You're all set to get started!</p>
        <a href="login.html" class="btn">Go to Login</a>
    </div>
</body>

</html>
